<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDR Elite</title>
    <style>
        :root {
            --accent: #2563eb;
            --glass: rgba(255, 255, 255, 0.95);
            --grad: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
        }

        .app-container { width: 100%; max-width: 450px; animation: fadeIn 0.8s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { text-align: center; margin-bottom: 20px; }
        .header img { width: 80px; height: 80px; border-radius: 18px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .header h1 { font-size: 1.4rem; margin: 10px 0 0; color: #1e293b; letter-spacing: -0.5px; }

        .glass-card { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 28px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        
        label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 6px; display: block; letter-spacing: 0.5px; }

        input, select { 
            width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 14px; 
            font-size: 1rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f8fafc; outline: none; box-sizing: border-box;
        }

        input:focus { border-color: var(--accent); background: white; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .dashboard { 
            background: var(--grad); color: white; padding: 25px; 
            border-radius: 24px; margin-top: 25px; position: relative; overflow: hidden;
        }

        .dashboard::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
        }

        .stat-label { font-size: 0.75rem; text-transform: uppercase; opacity: 0.6; font-weight: 600; }
        .main-price { font-size: 2.2rem; font-weight: 800; margin: 5px 0; color: #60a5fa; display: block; }
        
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .stat-val { font-weight: 700; font-size: 1.1rem; display: block; }

        .save-btn { 
            width: 100%; padding: 18px; background: var(--accent); color: white; border: none; 
            border-radius: 18px; font-weight: 800; font-size: 1rem; margin-top: 20px;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); transition: all 0.2s;
        }
        .save-btn:active { transform: scale(0.96); }

        .history-pill { 
            background: white; padding: 12px 20px; border-radius: 50px; margin-top: 10px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #edf2f7;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <img src="image_5.png" alt="MDR Logo">
        <h1>MDR Calculator</h1>
    </div>

    <div class="glass-card">
        <div class="input-row">
            <div><label>Height (ft)</label><input type="number" id="h" placeholder="6" oninput="calculate()"></div>
            <div><label>Sets (Pair)</label><input type="number" id="sets" value="1" oninput="calculate()"></div>
        </div>
        <div class="input-row">
            <div><label>Length (ft)</label><input type="number" id="l" placeholder="5" oninput="calculate()"></div>
            <div><label>Depth (ft)</label><input type="number" id="d" placeholder="2" oninput="calculate()"></div>
        </div>
        <div class="input-row">
            <div><label>Levels</label><input type="number" id="levels" value="3" oninput="calculate()"></div>
            <div><label>Rate / KG</label><input type="number" id="rate" value="100" oninput="calculate()"></div>
        </div>
        
        <label>Beam Thickness</label>
        <select id="beamThick" onchange="calculate()" style="margin-bottom:15px">
            <option value="1.17">2 mm (Light Duty)</option>
            <option value="1.46" selected>2.5 mm (Standard)</option>
            <option value="1.75">3 mm (Heavy Duty)</option>
        </select>

        <label>Shelf Thickness</label>
        <select id="shelfThick" onchange="calculate()">
            <option value="0.715">1 mm Sheet</option>
            <option value="1.2">1.2 mm Heavy Sheet</option>
        </select>

        <div class="dashboard">
            <span class="stat-label">Total Estimate (Incl. 18% GST)</span>
            <span class="main-price" id="price_gst">₹0</span>
            
            <div class="grid-stats">
                <div><span class="stat-label">Net Weight</span><span class="stat-val" id="w_total">0 kg</span></div>
                <div><span class="stat-label">GST Tax</span><span class="stat-val" id="gst_amt">₹0</span></div>
            </div>
        </div>

        <button class="save-btn" onclick="saveHistory()">Save Quotation</button>
    </div>

    <div id="historyList" style="margin-top:25px"></div>
</div>

<script>
    function calculate() {
        const h = parseFloat(document.getElementById('h').value) || 0;
        const sets = parseFloat(document.getElementById('sets').value) || 0;
        const l = parseFloat(document.getElementById('l').value) || 0;
        const d = parseFloat(document.getElementById('d').value) || 0;
        const levels = parseFloat(document.getElementById('levels').value) || 0;
        const beamKg = parseFloat(document.getElementById('beamThick').value);
        const shelfKg = parseFloat(document.getElementById('shelfThick').value);
        const rate = parseFloat(document.getElementById('rate').value) || 0;

        let totalWeight = (((h * 0.615 * 2) + (6 * d * 0.615)) * sets) + (beamKg * l * levels * 2) + (l * d * levels * shelfKg);
        let priceBase = totalWeight * rate;
        let gst = priceBase * 0.18;
        let finalPrice = priceBase + gst;

        document.getElementById('w_total').innerText = totalWeight.toFixed(2) + " kg";
        document.getElementById('gst_amt').innerText = "₹" + Math.round(gst).toLocaleString('en-IN');
        document.getElementById('price_gst').innerText = "₹" + Math.round(finalPrice).toLocaleString('en-IN');
    }

    function saveHistory() {
        const total = document.getElementById('price_gst').innerText;
        const info = `${document.getElementById('h').value}'x${document.getElementById('l').value}'`;
        if(!document.getElementById('h').value) return;
        
        let history = JSON.parse(localStorage.getItem('rackHistory')) || [];
        history.unshift({ info, total, date: new Date().toLocaleDateString() });
        localStorage.setItem('rackHistory', JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        let history = JSON.parse(localStorage.getItem('rackHistory')) || [];
        const list = document.getElementById('historyList');
        list.innerHTML = history.slice(0, 3).map(i => `
            <div class="history-pill">
                <span style="font-weight:700; color:#1e293b">${i.info}</span>
                <span style="font-weight:800; color:var(--accent)">${i.total}</span>
            </div>
        `).join('');
    }
    window.onload = renderHistory;
</script>
</body>
</html>
